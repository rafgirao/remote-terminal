name: Release & Update Homebrew

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats-core
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Run shell tests
        run: bats tests/shell/

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install pytest
        run: pip install pytest
      - name: Run Python tests
        run: pytest tests/python/ -v

  release:
    needs: [test-shell, test-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release tarball
        run: |
          tar czf remote-terminal-${{ steps.version.outputs.version }}.tar.gz \
            --transform "s,^,remote-terminal-${{ steps.version.outputs.version }}/," \
            bin/ share/ LICENSE README.md

      - name: Get tarball SHA256
        id: sha
        run: |
          SHA=$(sha256sum remote-terminal-${{ steps.version.outputs.version }}.tar.gz | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with asset
        run: |
          gh release create "$GITHUB_REF_NAME" \
            remote-terminal-${{ steps.version.outputs.version }}.tar.gz \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          URL="https://github.com/rafgirao/remote-terminal/releases/download/v${VERSION}/remote-terminal-${VERSION}.tar.gz"

          git clone https://x-access-token:${GH_TOKEN}@github.com/rafgirao/homebrew-remote-terminal.git /tmp/homebrew
          cd /tmp/homebrew

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/cli.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA}\"/" Formula/cli.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cli.rb
          git commit -m "Bump formula to v${VERSION}"
          git push
